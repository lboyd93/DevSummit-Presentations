<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Application Authentication Demo</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <script type="module">
    // Import the IdentityManager module from the ArcGIS Maps SDK for JavaScript
    const IdentityManager = await $arcgis.import(
      "@arcgis/core/identity/IdentityManager.js",
    );
    // The URL of our token server
    // Local dev default: the Node demo starts over HTTP unless you configure TLS.
    // If you enable HTTPS on the token server, switch this to your https URL.
    const appTokenURL = "http://localhost:3080/auth";

    const tokenData = { nonce: 1234 };

    // Send a request to the token server to exchange the app credentials for an access token.
    const tokenRequest = await fetch(appTokenURL, {
      method: "POST",
      body: JSON.stringify(tokenData),
      headers: {
        "Content-Type": "application/json",
      },
    });

    // Get the token response from the server and register it with the IdentityManager.
    const tokenResponse = await tokenRequest.json();
    console.log(tokenResponse);

    IdentityManager.registerToken({
      expires: tokenResponse.expires_in,
      server: tokenResponse.appTokenBaseURL,
      ssl: true,
      token: tokenResponse.access_token,
      userId: tokenResponse.arcgisUserId,
    });
  </script>

  <body>
    <calcite-shell>
      <calcite-navigation slot="header">
        <calcite-navigation-logo
          id="nav-logo"
          slot="logo"
          heading="ArcGIS Maps SDK for JavaScript Application Authentication Demo"
          description="This demo showcases how to authenticate a JS Maps SDK application using application authentication with a Node.js server that acts as a proxy service for ArcGIS application credentials."
        >
        </calcite-navigation-logo>
      </calcite-navigation>
      <arcgis-map id="mapEl" item-id="3773cbb4b2484cf49f0f5e8bbeeafa24">
        <arcgis-search slot="bottom-right"></arcgis-search>
      </arcgis-map>
    </calcite-shell>
  </body>
</html>
